# Nexus Audit V3 — Default Rules (schema compatible with core/rules_engine.py)

rules:
  - id: ghost-file
    name: "Ghost file"
    type: "ghost"
    severity: "LOW"
    category: "architecture"
    description: "File exists on disk but is never imported"
    suggestion: "Remove unused file or add an import from an entry point"

  - id: no-circular-import
    name: "Circular import"
    type: "cycle"
    severity: "HIGH"
    category: "architecture"
    description: "Detect circular dependencies between modules"
    suggestion: "Refactor to remove circular imports"

  - id: avoid-print
    name: "Avoid print()"
    type: "regex"
    severity: "LOW"
    category: "quality"
    config:
      expression: "\\bprint\\s*\("
    description: "Avoid using print() in production code; use logging"
    suggestion: "Replace print() with structured logging calls"

  - id: large-number-of-security-findings
    name: "Security findings metric"
    type: "metric"
    severity: "MEDIUM"
    category: "security"
    config:
      metric: "security"
      threshold: 10

apps: []

communication:
  allowed_patterns: []

scoring:
  penalties:
    violation_default: 5
  exclude_tests: true
