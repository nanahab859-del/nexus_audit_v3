<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Audit — Settings</title>
    <meta name="description" content="Nexus Audit settings: configure AI providers, scanners, scoring weights, and rules.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/settings.css">
    <script type="module" src="/static/js/settings-app.js" defer></script>
</head>
<body>
<div id="settings-app">

    <!-- TOP BAR -->
    <header id="settings-topbar">
        <div class="topbar-left">
            <a href="/" class="back-btn" title="Back to Dashboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Dashboard
            </a>
            <div class="topbar-divider"></div>
            <div class="topbar-title">
                <div class="topbar-logo">⬡</div>
                Settings
            </div>
        </div>
        <div id="save-status" class="save-status">
            <span class="status-dot"></span>
            <span class="status-text">All changes saved</span>
        </div>
    </header>

    <!-- BODY: SIDEBAR + CONTENT -->
    <div id="settings-body">

        <nav id="settings-sidebar">
            <div class="sidebar-section-label">Configuration</div>

            <button class="snav-item" data-tab="general">
                <span class="snav-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </span>
                General
            </button>

            <button class="snav-item" data-tab="ai">
                <span class="snav-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/>
                        <path d="M8 12h8M12 8v8"/>
                    </svg>
                </span>
                AI &amp; API
            </button>

            <button class="snav-item" data-tab="rules">
                <span class="snav-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </span>
                Rules
            </button>

            <button class="snav-item" data-tab="apps">
                <span class="snav-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                    </svg>
                </span>
                Apps
            </button>

            <button class="snav-item" data-tab="scanners">
                <span class="snav-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </span>
                Scanners
            </button>

            <button class="snav-item" data-tab="scoring">
                <span class="snav-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                </span>
                Scoring
            </button>

            <div class="sidebar-section-label">System</div>

            <button class="snav-item" data-tab="diagnostics">
                <span class="snav-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                    </svg>
                </span>
                Diagnostics
            </button>
        </nav>

        <!-- MAIN CONTENT -->
        <main id="settings-content">
            <div id="global-error" class="error-banner hidden"></div>
            <div id="tab-general"     class="stab-content"></div>
            <div id="tab-ai"          class="stab-content"></div>
            <div id="tab-rules"       class="stab-content"></div>
            <div id="tab-apps"        class="stab-content"></div>
            <div id="tab-scanners"    class="stab-content"></div>
            <div id="tab-scoring"     class="stab-content"></div>
            <div id="tab-diagnostics" class="stab-content"></div>
        </main>
    </div>

    <!-- FOOTER -->
    <footer id="settings-footer">
        <button id="revert-btn" class="secondary-btn" onclick="location.reload()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
            </svg>
            Revert
        </button>
        <button id="save-btn" class="primary-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
            </svg>
            Save All Settings
        </button>
    </footer>

</div>
</body>
</html>
