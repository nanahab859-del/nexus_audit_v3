<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Audit — Command Center</title>
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <script type="module" src="/static/js/main.js" defer></script>
</head>
<body>
<div id="app">

    <!-- Top Bar -->
    <header id="topbar">
        <div class="topbar-left">
            <img src="/static/assets/logo.svg" class="logo" alt="Nexus Audit">
            <span class="app-name">Nexus Audit</span>
        </div>
        <div class="topbar-right">
            <button id="btn-palette" class="icon-btn" title="Command palette (Cmd+K)">⌘K</button>
            <button id="btn-settings" class="icon-btn" title="Settings">⚙️</button>
            <button id="btn-theme" class="icon-btn" title="Toggle theme">🌙</button>
            <button id="btn-run" class="primary-btn">▶ Run Audit</button>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav id="tab-bar" style="display: flex; overflow-x: auto; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 0;">
        <button class="tab-btn" onclick="location.hash='#/dashboard'" title="Dashboard">📊 Dashboard</button>
        <button class="tab-btn" onclick="location.hash='#/violations'" title="Violations">🏗️ Violations</button>
        <button class="tab-btn" onclick="location.hash='#/security'" title="Security">🔒 Security</button>
        <button class="tab-btn" onclick="location.hash='#/dependencies'" title="Dependencies">📦 Dependencies</button>
        <button class="tab-btn" onclick="location.hash='#/recommendations'" title="Recommendations">💡 Recommendations</button>
        <button class="tab-btn" onclick="location.hash='#/config-health'" title="Config Health">⚙️ Config</button>
        <button class="tab-btn" onclick="location.hash='#/graph'" title="Graph">📊 Graph</button>
        <button class="tab-btn" onclick="location.hash='#/trends'" title="Trends">📈 Trends</button>
        <button class="tab-btn" onclick="location.hash='#/coupling'" title="Coupling">🔗 Coupling</button>
        <button class="tab-btn" onclick="location.hash='#/ghost-files'" title="Ghost Files">👻 Ghosts</button>
        <button class="tab-btn" onclick="location.hash='#/cycles'" title="Cycles">🔄 Cycles</button>
        <button class="tab-btn" onclick="location.hash='#/manifest'" title="Manifest">📋 Manifest</button>
        <button class="tab-btn" onclick="location.hash='#/rules'" title="Rules Editor">📝 Rules</button>
        <button class="tab-btn" onclick="location.hash='#/apps'" title="Apps">🏗️ Apps</button>
        <button class="tab-btn" onclick="location.hash='#/issues'" title="Issues">🔍 Issues</button>
        <button class="tab-btn" onclick="location.hash='#/history'" title="History">📜 History</button>
    </nav>

    <!-- Main View Container -->
    <main id="view-container">
        <div id="view-dashboard" class="view"></div>
        <div id="view-violations" class="view hidden"></div>
        <div id="view-security" class="view hidden"></div>
        <div id="view-dependencies" class="view hidden"></div>
        <div id="view-recommendations" class="view hidden"></div>
        <div id="view-graph" class="view hidden"></div>
        <div id="view-trends" class="view hidden"></div>
        <div id="view-coupling" class="view hidden"></div>
        <div id="view-ghost-files" class="view hidden"></div>
        <div id="view-cycles" class="view hidden"></div>
        <div id="view-manifest" class="view hidden"></div>
        <div id="view-config-health" class="view hidden"></div>
        <div id="view-rules" class="view hidden"></div>
        <div id="view-apps" class="view hidden"></div>
        <div id="view-issues" class="view hidden"></div>
        <div id="view-history" class="view hidden"></div>
    </main>

    <!-- Progress Panel (slides up during audit) -->
    <div id="progress-panel">
        <div class="progress-header">
            <span id="progress-title">Audit Running…</span>
            <button id="btn-cancel" class="secondary-btn">Cancel</button>
        </div>
        <div id="progress-scanners"></div>
        <div id="progress-log"></div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay"></div>
    <div id="modal-issue" class="modal"></div>

    <!-- Command Palette -->
    <div id="command-palette">
        <input type="text" class="palette-input" placeholder="Type a command or search findings...">
        <div class="palette-list"></div>
    </div>

</div>
</body>
</html>
